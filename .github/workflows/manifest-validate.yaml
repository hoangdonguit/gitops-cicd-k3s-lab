name: manifest-validate

on:
  push:
    branches:
      - main
    paths:
      - "k8s/**"
      - ".github/workflows/manifest-validate.yaml"

permissions:
  contents: read

jobs:
  kustomize-render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Render dev overlay
        run: |
          mkdir -p /tmp/gitops-cicd-k3s-lab
          kubectl kustomize k8s/overlays/dev > /tmp/gitops-cicd-k3s-lab/rendered-dev.yaml
          test -s /tmp/gitops-cicd-k3s-lab/rendered-dev.yaml
          grep -q "kind: Deployment" /tmp/gitops-cicd-k3s-lab/rendered-dev.yaml
          grep -q "kind: Service" /tmp/gitops-cicd-k3s-lab/rendered-dev.yaml

      - name: Show rendered manifest preview
        run: sed -n '1,160p' /tmp/gitops-cicd-k3s-lab/rendered-dev.yaml

      - name: Upload rendered manifest
        uses: actions/upload-artifact@v4
        with:
          name: rendered-dev-manifest
          path: /tmp/gitops-cicd-k3s-lab/rendered-dev.yaml
